name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Только один деплой за раз; новый отменяет предыдущий незавершённый.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          # /<имя-репо>/ — подставляется автоматически из имени репозитория
          VITE_BASE: /${{ github.event.repository.name }}/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url }}
    steps:
      # Pages периодически отвечает «Deployment failed, try again later» —
      # повторяем до трёх раз с паузами, прежде чем сдаться.
      - id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Пауза перед повтором
        if: steps.deploy1.outcome == 'failure'
        run: sleep 60
      - id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Пауза перед последней попыткой
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 180
      - id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
      # При полном провале выводим конфиг Pages в аннотации —
      # их видно по публичному API без токена (диагностика build_type и т.п.)
      - name: Диагностика Pages
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cfg=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" | tr -d '\n' | tr -s ' ')
          echo "::error title=PagesConfig::${cfg:0:800}"
          health=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/health" | tr -d '\n' | tr -s ' ')
          echo "::error title=PagesHealth::${health:0:800}"
